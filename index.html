<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0d13" />
    <meta name="description" content="A star, dedicated to Shivanjali. A letter written in starlight." />
    <title>Under the Same Sky | Shivanjali</title>

    <!-- Favicon Assets -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>

    <a class="skip-link" href="#letter">Skip to letter</a>
    <div id="progress" role="presentation"></div>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="corner-log" aria-hidden="true">LOG NO. 001 - REGULUS - DEDICATED 09.08.2026</div>

    <!-- High-End Observatory Telescope Loader Screen Overlay -->
    <div id="loader" role="status" aria-live="polite">
        <!-- Background Particle Field Plane -->
        <div class="stardust-field" id="loaderField"></div>

        <!-- Background Shooting Star Traversal Matrix -->
        <div class="meteor-lane" id="meteorLane">
            <div class="meteor m1"></div>
            <div class="meteor m2"></div>
            <div class="meteor m3"></div>
        </div>

        <!-- Centered Fine-Art Astronomical Telemetry Instrument -->
        <div class="reticle-container" aria-hidden="true">
            <div class="reticle-ring-outer"></div>
            <div class="reticle-ring-mid"></div>
            <div class="reticle-ring-inner"></div>
            <div class="reticle-axis-y"></div>
            <div class="reticle-axis-x"></div>
            <div class="reticle-core-node"></div>
        </div>

        <p class="loader-text">A letter written in starlight…</p>
    </div>

    <!-- Hidden 5-Tap Easter Egg Modal Overlay -->
    <div id="egg-overlay">
        <div>
            <p>The real star was never in the sky.<br>It has always been you.</p>
            <button id="egg-close" type="button">Close</button>
        </div>
    </div>

    <!-- The dynamic hydration runtime mount element -->
    <main id="app-container"></main>

    <footer>
        <h2>Under the Same Sky</h2>
        <p>No matter where life takes us, we'll always be under the same sky.</p>
    </footer>

    <script type="module">
        import { Story } from './src/model/Story.js';
        import { Page } from './src/model/Page.js';
        import { Section } from './src/model/Section.js';
        import { ContentBlock } from './src/model/ContentBlock.js';

        // --- MODULE A: DEEP STARFIELD GENERATION ENGINE ---
        const Starfield = (function () {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            let stars = [], rafId = null, running = false;

            function build() {
                canvas.width = window.innerWidth;
                canvas.height = document.body.scrollHeight || window.innerHeight;
                const count = Math.min(420, Math.floor((canvas.width * canvas.height) / 11000));
                stars = Array.from({ length: count }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.3 + 0.2,
                    base: Math.random() * 0.5 + 0.15,
                    speed: Math.random() * 0.015 + 0.004,
                    phase: Math.random() * Math.PI * 2,
                    layer: Math.random() < 0.75 ? 1 : 1.8
                }));
            }

            function frame(t) {
                if (!running) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const s of stars) {
                    const tw = reduceMotion ? s.base : s.base + Math.sin(t * s.speed + s.phase) * 0.32;
                    ctx.globalAlpha = Math.max(0, tw);
                    ctx.fillStyle = '#f2ecdd';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r * s.layer, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                if (!reduceMotion) { rafId = requestAnimationFrame(frame); }
            }

            return {
                init() {
                    build();
                    running = true;
                    if (reduceMotion) { frame(0); } else { rafId = requestAnimationFrame(frame); }
                    window.addEventListener('resize', () => { build(); if (reduceMotion) frame(0); });
                }
            };
        })();

        // --- MODULE B: SCROLL COMPONENT PROGRESS LINK ---
        const Progress = (function () {
            const bar = document.getElementById('progress');
            let ticking = false;
            function update() {
                const h = document.documentElement;
                const scrolled = h.scrollTop;
                const height = h.scrollHeight - h.clientHeight;
                bar.style.width = (height > 0 ? (scrolled / height) * 100 : 0) + '%';
                ticking = false;
            }
            return {
                init() {
                    window.addEventListener('scroll', () => {
                        if (!ticking) { requestAnimationFrame(update); ticking = true; }
                    }, { passive: true });
                    update();
                }
            };
        })();

        // --- MODULE C: DOM DATA LOAD HYDRATOR ENGINE ---
        window.addEventListener('DOMContentLoaded', async () => {
            // Run system rendering frames
            Starfield.init();

            try {
                const response = await fetch('./src/data/story.json');
                const rawData = await response.json();

                const keepsakeStory = new Story(rawData.title, rawData.metadata);
                rawData.pages.forEach(pData => {
                    const pageInstance = new Page(pData.title, pData.slug);
                    pData.sections.forEach(sData => {
                        const sectionInstance = new Section(sData.title);
                        sData.blocks.forEach(bData => {
                            sectionInstance.addBlock(new ContentBlock(bData.type, bData));
                        });
                        pageInstance.addSection(sectionInstance);
                    });
                    keepsakeStory.addPage(pageInstance);
                });

                renderKeepsakeContent(keepsakeStory);

                // Fire loader fade down sequence
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.classList.add('hidden');
                }, window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 600 : 3500);

            } catch (err) {
                console.error("Keepsake Engine parsing hydration failure: ", err);
            }
        });

        // --- MODULE D: CORE INTERACTIVE GENERATIVE LAYOUTS ---
        function renderKeepsakeContent(storyInstance) {
            const app = document.getElementById('app-container');

            storyInstance.pages.forEach(page => {
                const pageSection = document.createElement('section');
                pageSection.id = page.slug;
                pageSection.setAttribute('aria-labelledby', `${page.slug}-title`);

                page.sections.forEach(sec => {
                    const inner = document.createElement('div');
                    inner.className = 'section-inner';
                    if (page.slug === 'home' || page.slug === 'quote' || page.slug === 'findstar') {
                        inner.className += ' center';
                    }

                    // Insert modern decoration rules if matching sections
                    if (page.slug === 'letter') {
                        const header = document.createElement('div');
                        header.className = 'center reveal';
                        header.innerHTML = `<h2 id="letter-title" style="position:absolute;left:-9999px;">A letter to Shivanjali</h2><span class="eyebrow">The Letter</span><div class="rule d1"><div class="l"></div><div class="m">✦</div><div class="l r"></div></div>`;
                        pageSection.appendChild(header);
                    }

                    if (page.slug === 'about') {
                        const header = document.createElement('div');
                        header.className = 'center reveal';
                        header.innerHTML = `<span class="eyebrow">The Star</span><h2 id="about-title" class="reveal d1" style="font-size:clamp(2rem,5vw,2.8rem); font-style:italic; margin-top:12px;">Regulus</h2>`;
                        pageSection.appendChild(header);
                    }

                    if (page.slug === 'quote') {
                        const header = document.createElement('h2');
                        header.id = 'quote-title';
                        header.style.cssText = 'position:absolute;left:-9999px;';
                        header.textContent = 'Closing';
                        pageSection.appendChild(header);
                    }

                    // Setup custom layout grouping roots
                    let timelineWrap = null;
                    let dataGrid = null;
                    let galleryGrid = null;
                    let letterWrap = null;

                    // Build dynamic constellation frame for Hero View Page
                    if (page.slug === 'home') {
                        const frame = document.createElement('div');
                        frame.className = 'arrival-frame';
                        frame.innerHTML = `
                            <div class="const-wrap reveal">
                                <svg id="constSvg" viewBox="80 30 480 210" aria-hidden="true" style="transform: scale(-1, 1);">
                                <!-- Sickle / Head & Forequarters (Rasalas, Adhafera, Algieba, Eta, Regulus) -->
                                <line class="const-line" x1="160" y1="65" x2="195" y2="48"/>
                                <line class="const-line" x1="195" y1="48" x2="230" y2="62"/>
                                <line class="const-line" x1="230" y1="62" x2="232" y2="108"/>
                                <line class="const-line" x1="232" y1="108" x2="200" y2="152"/>
                                <line class="const-line" x1="200" y1="152" x2="182" y2="205"/>

                                <!-- Body & Hindquarters Triangle (Algieba -> Zosma -> Chertan -> Denebola) -->
                                <line class="const-line" x1="232" y1="108" x2="385" y2="115"/>
                                <line class="const-line" x1="385" y1="115" x2="395" y2="175"/>
                                <line class="const-line" x1="395" y1="175" x2="200" y2="152"/>
                                <line class="const-line" x1="385" y1="115" x2="520" y2="150"/>
                                <line class="const-line" x1="395" y1="175" x2="520" y2="150"/>

                                <!-- Stars in the Sickle -->
                                <circle class="const-star" cx="160" cy="65" r="2.6"/>
                                <circle class="const-star" cx="195" cy="48" r="2.8"/>
                                <circle class="const-star" cx="230" cy="62" r="3.2"/>
                                <circle class="const-star" cx="232" cy="108" r="3.0"/>
                                <circle class="const-star" cx="200" cy="152" r="2.8"/>

                                <!-- Stars in Hindquarters -->
                                <circle class="const-star" cx="385" cy="115" r="3.0"/>
                                <circle class="const-star" cx="395" cy="175" r="2.8"/>
                                <circle class="const-star" cx="520" cy="150" r="3.5"/>

                                <!-- Regulus (Alpha Star - Dedicated Focus Dot) -->
                                <circle id="regulusDot" cx="182" cy="205" r="6"/>
                                </svg>
                            </div>
                        `;
                        inner.appendChild(frame);
                    }

                    sec.blocks.forEach((block, idx) => {
                        const props = block.properties;

                        if (block.type === 'heading' && page.slug === 'home') {
                            const wrapper = inner.querySelector('.arrival-frame');
                            const span = document.createElement('span'); span.className = 'eyebrow reveal d1'; span.textContent = 'A Personal Star Dedication for';
                            const h1 = document.createElement('h1'); h1.id = 'home-title'; h1.className = 'name reveal d2'; h1.textContent = props.text;
                            wrapper.appendChild(span);
                            wrapper.appendChild(h1);
                        }
                        else if (block.type === 'subtitle' && page.slug === 'home') {
                            const wrapper = inner.querySelector('.arrival-frame');
                            const p = document.createElement('p'); p.className = 'arrival-sub reveal d3'; p.textContent = props.text;
                            wrapper.appendChild(p);
                        }
                        else if (block.type === 'date' && page.slug === 'home') {
                            const wrapper = inner.querySelector('.arrival-frame');
                            const tag = document.createElement('p'); tag.className = 'log-tag arrival-date reveal'; tag.style.transitionDelay = '0.5s';
                            tag.textContent = `Regulus · The Heart of Leo · Dedicated ${props.text}`;
                            const cue = document.createElement('div'); cue.className = 'scroll-cue reveal'; cue.setAttribute('aria-hidden', 'true');
                            cue.innerHTML = `<div class="line"></div>`;
                            wrapper.appendChild(tag);
                            wrapper.appendChild(cue);
                        }
                        else if (block.type === 'paragraph' && page.slug === 'letter') {
                            if (!letterWrap) {
                                letterWrap = document.createElement('div');
                                letterWrap.className = 'letter-body reveal d2';
                                inner.appendChild(letterWrap);
                            }
                            const p = document.createElement('p'); p.textContent = props.text;
                            letterWrap.appendChild(p);
                        }
                        else if (block.type === 'signature' && page.slug === 'letter') {
                            const sign = document.createElement('div'); sign.className = 'letter-sign reveal d3'; sign.textContent = props.text.replace('❤️ ', '');
                            inner.appendChild(sign);
                        }
                        else if (block.type === 'paragraph' && page.slug === 'why') {
                            // Map generic text lades to standard timeline wrappers description headers
                            let lede = inner.querySelector('.why-lede');
                            if (!lede) {
                                const centerHeader = document.createElement('div'); centerHeader.className = 'center';
                                centerHeader.innerHTML = `<span class="eyebrow reveal">Why This Gift</span><h2 class="why-lede reveal d1">Some things are made to be replaced.<br>This isn't one of them.</h2>`;
                                inner.appendChild(centerHeader);
                                lede = document.createElement('div'); lede.className = 'why-body reveal d2';
                                inner.appendChild(lede);
                            }
                            const bodyContainer = inner.querySelector('.why-body');
                            const p = document.createElement('p'); p.textContent = props.text;
                            bodyContainer.appendChild(p);
                        }
                        else if (block.type === 'timeline_event') {
                            if (!timelineWrap) {
                                timelineWrap = document.createElement('div');
                                timelineWrap.className = 'tl-wrap reveal d3';
                                const connector = document.createElement('div');
                                connector.className = 'tl-line';
                                timelineWrap.appendChild(connector);
                                inner.appendChild(timelineWrap);
                            }
                            const item = document.createElement('div');
                            item.className = 'tl-item' + (props.title === 'Regulus' ? ' star' : '');
                            item.innerHTML = `<div class="tl-dot">${props.marker}</div><div class="tl-text"><h3>${props.title}</h3><p>${props.description}</p></div>`;
                            timelineWrap.appendChild(item);
                        }
                        else if (block.type === 'fact') {
                            if (!dataGrid) {
                                dataGrid = document.createElement('div');
                                dataGrid.className = 'data-grid reveal d2';
                                inner.appendChild(dataGrid);
                            }
                            const cell = document.createElement('div'); cell.className = 'dcell';
                            const isMono = props.label.includes('Coordinates');
                            cell.innerHTML = `<div class="dl">${props.label}</div><div class="dv${isMono ? ' mono' : ''}">${props.value}</div>`;
                            dataGrid.appendChild(cell);
                        }
                        else if (block.type === 'gallery') {
                            const gridTitle = document.createElement('h2'); gridTitle.id = 'gallery-title'; gridTitle.className = 'reveal d1';
                            gridTitle.style.cssText = `font-size:clamp(2rem,4.6vw,2.6rem); font-style:italic; margin-top:12px; margin-bottom: 2rem;`;
                            gridTitle.textContent = 'Gallery';
                            inner.appendChild(gridTitle);

                            galleryGrid = document.createElement('div');
                            galleryGrid.className = 'gallery-grid reveal d2';

                            props.images.forEach((imgData, sIdx) => {
                                const figure = document.createElement('figure');
                                if (sIdx === 0 || sIdx === 5) figure.className = 'g-tall';

                                const img = document.createElement('img');
                                img.src = imgData.src;
                                img.alt = imgData.caption;
                                img.loading = 'lazy';
                                const cap = document.createElement('div');
                                cap.className = 'gallery-caption';
                                cap.textContent = imgData.caption;

                                img.onerror = function () {
                                    this.remove();
                                    cap.remove();
                                    const ph = document.createElement('div');
                                    ph.className = 'gallery-placeholder';
                                    ph.textContent = imgData.caption;
                                    figure.appendChild(ph);
                                };

                                figure.appendChild(img);
                                figure.appendChild(cap);
                                galleryGrid.appendChild(figure);
                            });
                            inner.appendChild(galleryGrid);
                        }
                        else if (block.type === 'quote') {
                            const q = document.createElement('p'); q.className = 'finale-quote reveal';
                            q.innerHTML = props.text.replace('look up', '<span class="grace">look up</span>');
                            inner.appendChild(q);
                        }
                        else if (block.type === 'signature' && page.slug === 'quote') {
                            const sign = document.createElement('div'); sign.className = 'finale-sign reveal d1'; sign.textContent = props.text.replace('- ', '');
                            const bridge = document.createElement('p'); bridge.className = 'bridge-line reveal d2'; bridge.textContent = 'Some gifts are meant to last for a moment. I wanted yours to last for a lifetime.';
                            inner.appendChild(sign);
                            inner.appendChild(bridge);
                        }
                        else if (block.type === 'heading' && page.slug === 'findstar') {
                            inner.innerHTML = `<span class="eyebrow reveal">Begin the Journey</span><h2 id="findstar-title" class="reveal d1" style="font-size:clamp(1.9rem,4.6vw,2.5rem); font-style:italic; margin-top:14px;">Find Our Star</h2>`;

                            const btn = document.createElement('a'); btn.className = 'cta-btn reveal d2'; btn.href = './tonight.html'; btn.textContent = '✦ Find Our Star';
                            const note = document.createElement('p'); note.className = 'cta-note reveal d3'; note.textContent = 'A living page, worth returning to - tonight, and every night after.';
                            inner.appendChild(btn);
                            inner.appendChild(note);
                        }
                    });

                    pageSection.appendChild(inner);
                });

                app.appendChild(pageSection);
            });

            // Boot Interaction Engine Components
            Progress.init();
            setupIntersectionReveal();
            setupEasterEgg();
        }

        // --- MODULE E: SCROLL REVEAL TIMING ---
        function setupIntersectionReveal() {
            const els = document.querySelectorAll('.reveal');
            if (!('IntersectionObserver' in window)) {
                els.forEach(el => el.classList.add('visible'));
                return;
            }
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
            }, { threshold: 0.12 });
            els.forEach(el => io.observe(el));
        }

        // --- MODULE F: EASTER EGG LOGIC LOOP ---
        function setupEasterEgg() {
            const dot = document.getElementById('regulusDot');
            const overlay = document.getElementById('egg-overlay');
            const closeBtn = document.getElementById('egg-close');
            let taps = 0, lastTap = 0;

            if (dot) {
                dot.addEventListener('click', () => {
                    const now = Date.now();
                    if (now - lastTap > 1500) taps = 0;
                    taps++;
                    lastTap = now;
                    if (taps >= 5) { overlay.classList.add('show'); taps = 0; }
                });
            }
            closeBtn.addEventListener('click', () => overlay.classList.remove('show'));
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') overlay.classList.remove('show'); });
        }
    </script>
</body>

</html>
